services:
  db:
    image: postgres:16
    container_name: assetmanager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assetdb}
      POSTGRES_USER: ${POSTGRES_USER:-assetuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assetpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: assetmanager-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-assetuser}:${POSTGRES_PASSWORD:-assetpass}@db:5432/${POSTGRES_DB:-assetdb}
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-long-random-string}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
